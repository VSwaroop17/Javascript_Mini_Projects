<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Objects Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>JavaScript Objects Visualizer</h1>

  <div class="card">

    <h2>Create Student Object</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="age" placeholder="Enter Age">
    <input type="text" id="course" placeholder="Enter Course">

    <button onclick="createObject()">
      Create Object
    </button>

  </div>

  <div class="grid">

    <div class="box">
      <h3>Object Intro</h3>
      <p id="intro"></p>
    </div>

    <div class="box">
      <h3>Object Properties</h3>
      <p id="properties"></p>
    </div>

    <div class="box">
      <h3>Object Method</h3>
      <p id="methods"></p>
    </div>

    <div class="box">
      <h3>Object this</h3>
      <p id="thisData"></p>
    </div>

    <div class="box">
      <h3>Object Display</h3>
      <p id="display"></p>
    </div>

    <div class="box">
      <h3>Object Path</h3>
      <p id="path"></p>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
